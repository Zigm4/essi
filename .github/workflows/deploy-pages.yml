name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['webapp/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
        working-directory: webapp
      - run: npm test
        working-directory: webapp
      - run: npm run build
        working-directory: webapp
        env:
          # Project pages are served from /<repo>/ — derive automatically.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Set the JPL_PROXY_URL repository variable once the Cloudflare
          # worker is deployed (Settings → Secrets and variables → Variables).
          VITE_JPL_PROXY_URL: ${{ vars.JPL_PROXY_URL }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
