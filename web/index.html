<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Base href is injected by `flutter build web --base-href "/<repo>/"`
       (GitHub Pages serves project sites under a sub-path). -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Underdeck — the UP55 fan companion. Tools, maps, knowledge base and fleet registry.">
  <!-- The bundled community datasets are not for search engines. -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#03060B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Underdeck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Underdeck</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ESSI boot splash — shown until Flutter renders its first frame. */
    html, body {
      margin: 0;
      padding: 0;
      background: #03060B;
      height: 100%;
      overflow: hidden;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background:
        radial-gradient(120% 90% at 18% 0%, rgba(79, 195, 255, 0.10), transparent 55%),
        #03060B;
      z-index: 9999;
      transition: opacity 320ms ease-out;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      user-select: none;
    }
    #splash.gone { opacity: 0; pointer-events: none; }
    #splash .wordmark {
      color: #EAF6FF;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.42em;
      padding-left: 0.42em; /* optical centering for the tracking */
      text-shadow: 0 0 18px rgba(79, 195, 255, 0.55);
    }
    #splash .sub {
      color: #4FC3FF;
      font-size: 11px;
      letter-spacing: 0.30em;
      padding-left: 0.30em;
      opacity: 0.85;
    }
    #splash .bar {
      width: 168px;
      height: 2px;
      background: rgba(79, 195, 255, 0.16);
      border-radius: 2px;
      overflow: hidden;
    }
    #splash .bar::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      background: #4FC3FF;
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(79, 195, 255, 0.8);
      animation: scan 1.15s ease-in-out infinite alternate;
    }
    @keyframes scan {
      from { transform: translateX(-30%); }
      to   { transform: translateX(280%); }
    }
    @media (prefers-reduced-motion: reduce) {
      #splash .bar::after { animation: none; transform: translateX(75%); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="wordmark">UNDERDECK</div>
    <div class="sub">ESSI // BOOT SEQUENCE</div>
    <div class="bar"></div>
  </div>

  <script>
    // Remove the splash once Flutter paints its first frame (with a fallback
    // so a slow load never leaves a stuck splash covering an interactive app).
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('gone'); setTimeout(function () { s.remove(); }, 400); }
    });
    setTimeout(function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('gone'); setTimeout(function () { s.remove(); }, 400); }
    }, 30000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
