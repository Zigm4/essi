name: underdeck_app
description: "Underdeck companion app for Underpunks55, cross platform iOS and Android"
publish_to: 'none'

version: 0.2.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27

  go_router: ^14.6.2

  dio: ^5.7.0

  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  flutter_markdown: ^0.7.4

  shared_preferences: ^2.3.3

  path_provider: ^2.1.5
  path: ^1.9.0

  google_fonts: ^6.2.1

  intl: ^0.19.0
  uuid: ^4.5.1

  collection: ^1.19.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/catalog/
    - assets/knowledge/
    - assets/knowledge/01-maps/
    - assets/knowledge/02-systems/
    - assets/knowledge/images/
