name: underdeck_app
description: "Underdeck companion app for Underpunks55, cross platform iOS and Android"
publish_to: 'none'

version: 0.2.0+5

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27

  go_router: ^14.6.2

  dio: ^5.7.0

  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  flutter_markdown_plus: ^1.0.11

  shared_preferences: ^2.3.3

  path_provider: ^2.1.5
  path: ^1.9.0

  intl: ^0.19.0
  uuid: ^4.5.1

  collection: ^1.19.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.1
  share_plus: ^11.0.0
  file_selector: ^1.0.3
  image_picker: ^1.1.2
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  sqlite3: ^2.4.0 # direct import in test/db_migration_test.dart
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/catalog/
    - assets/knowledge/
    - assets/knowledge/01-maps/
    - assets/knowledge/02-systems/
    - assets/knowledge/03-guilds/
    - assets/knowledge/04-shires/
    - assets/knowledge/images/
    # Bundled OFL license texts for the fonts below (registered in main()).
    - assets/fonts/Inter-OFL.txt
    - assets/fonts/JetBrainsMono-OFL.txt
    - assets/fonts/Quicksand-OFL.txt

  # Fonts bundled as assets so nothing is fetched from fonts.gstatic.com at
  # runtime (privacy + offline first-paint). These are the upstream Google Fonts
  # variable TTFs; Flutter interpolates the `wght` axis from TextStyle.fontWeight
  # (Quicksand's axis maxes at 700, matching the previous runtime behaviour).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Variable.ttf
